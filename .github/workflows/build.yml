name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
          autoconf libtool pkg-config zlib1g-dev libncurses-dev \
          libtinfo-dev cmake libffi-dev libssl-dev build-essential \
          ccache libltdl-dev

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.36

    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-${{ hashFiles('buildozer.spec') }}-v2

    - name: Build APK
      run: |
        export PATH=$PATH:~/.local/bin/
        yes | buildozer android debug || true
        # Accept all SDK licenses if SDK exists
        if [ -d ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin ]; then
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        fi
        # Build again after license acceptance
        buildozer android debug

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: FastDrop-APK
        path: bin/*.apk
